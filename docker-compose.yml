services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      # Requests arrive same-origin through the gateway, but keep permissive
      # CORS in case the API is reached directly.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:3001}
      DATABASE_URL: sqlite:////app/data/hotel_recommendation.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DEBUG: ${DEBUG:-false}
    volumes:
      - backend-data:/app/data
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Relative path -> browser calls the gateway same-origin.
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin-pannel
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    expose:
      - "3001"
    depends_on:
      - backend

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - admin
      - backend

volumes:
  backend-data:
